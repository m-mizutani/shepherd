openapi: "3.0.3"
info:
  title: Shepherd API
  version: "0.1.0"

paths:
  /api/v1/health:
    get:
      operationId: getHealth
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                required: [status]

  /api/v1/ws:
    get:
      operationId: listWorkspaces
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  workspaces:
                    type: array
                    items:
                      $ref: "#/components/schemas/Workspace"
                required: [workspaces]

  /api/v1/ws/{workspaceId}:
    get:
      operationId: getWorkspace
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workspace"
        "404":
          description: Not Found

  /api/v1/ws/{workspaceId}/config:
    get:
      operationId: getWorkspaceConfig
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceConfig"
        "404":
          description: Not Found

  /api/v1/ws/{workspaceId}/tickets:
    get:
      operationId: listTickets
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
        - name: statusId
          in: query
          schema:
            type: string
        - name: isClosed
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  tickets:
                    type: array
                    items:
                      $ref: "#/components/schemas/Ticket"
                required: [tickets]
        "404":
          description: Not Found
    post:
      operationId: createTicket
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTicketRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ticket"
        "404":
          description: Not Found

  /api/v1/ws/{workspaceId}/tickets/{ticketId}:
    get:
      operationId: getTicket
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
        - $ref: "#/components/parameters/TicketId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ticket"
        "404":
          description: Not Found
    patch:
      operationId: updateTicket
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
        - $ref: "#/components/parameters/TicketId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTicketRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ticket"
        "404":
          description: Not Found
    delete:
      operationId: deleteTicket
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
        - $ref: "#/components/parameters/TicketId"
      responses:
        "204":
          description: Deleted
        "404":
          description: Not Found

  /api/v1/ws/{workspaceId}/slack/users:
    get:
      operationId: listSlackUsers
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  users:
                    type: array
                    items:
                      $ref: "#/components/schemas/SlackUserInfo"
                required: [users]
        "404":
          description: Not Found

  /api/v1/ws/{workspaceId}/slack/users/{userId}:
    get:
      operationId: getSlackUserInfo
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SlackUserInfo"
        "404":
          description: Not Found

  /api/v1/ws/{workspaceId}/sources:
    get:
      operationId: listSources
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  sources:
                    type: array
                    items:
                      $ref: "#/components/schemas/Source"
                required: [sources]
    post:
      operationId: createSource
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSourceRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Source"
        "400":
          description: Bad Request
        "409":
          description: Conflict

  /api/v1/ws/{workspaceId}/sources/{sourceId}:
    patch:
      operationId: updateSource
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
        - name: sourceId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSourceRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Source"
        "404":
          description: Not Found
    delete:
      operationId: deleteSource
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
        - name: sourceId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: No Content
        "404":
          description: Not Found

  /api/v1/ws/{workspaceId}/tools:
    get:
      operationId: listToolSettings
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  tools:
                    type: array
                    items:
                      $ref: "#/components/schemas/ToolState"
                required: [tools]

  /api/v1/ws/{workspaceId}/tools/{providerId}:
    put:
      operationId: setToolEnabled
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
        - name: providerId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                enabled:
                  type: boolean
              required: [enabled]
      responses:
        "204":
          description: No Content

  /api/v1/ws/{workspaceId}/prompts:
    get:
      operationId: listPrompts
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  prompts:
                    type: array
                    items:
                      $ref: "#/components/schemas/PromptSlot"
                required: [prompts]

  /api/v1/ws/{workspaceId}/prompts/{promptId}:
    get:
      operationId: getPrompt
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
        - $ref: "#/components/parameters/PromptId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PromptDetail"
        "404":
          description: Unknown promptId
    put:
      operationId: savePrompt
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
        - $ref: "#/components/parameters/PromptId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                content:
                  type: string
                version:
                  type: integer
                  minimum: 1
                  description: The version number the caller is writing. Must equal current+1 (or 1 when no override exists yet); otherwise 409 Conflict.
              required: [content, version]
      responses:
        "200":
          description: Saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PromptVersion"
        "404":
          description: Unknown promptId
        "409":
          description: Version conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PromptVersionConflict"

  /api/v1/ws/{workspaceId}/prompts/{promptId}/history:
    get:
      operationId: listPromptHistory
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
        - $ref: "#/components/parameters/PromptId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  versions:
                    type: array
                    items:
                      $ref: "#/components/schemas/PromptVersion"
                required: [versions]
        "404":
          description: Unknown promptId

  /api/v1/ws/{workspaceId}/prompts/{promptId}/restore:
    post:
      operationId: restorePrompt
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
        - $ref: "#/components/parameters/PromptId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                targetVersion:
                  type: integer
                  minimum: 1
                  description: The version to restore from.
                version:
                  type: integer
                  minimum: 1
                  description: The new version number to write the restored content as. Must equal current+1.
              required: [targetVersion, version]
      responses:
        "200":
          description: Restored as a new version
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PromptVersion"
        "404":
          description: Unknown promptId or targetVersion
        "409":
          description: Version conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PromptVersionConflict"

  /api/v1/ws/{workspaceId}/tickets/{ticketId}/comments:
    get:
      operationId: listComments
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
        - $ref: "#/components/parameters/TicketId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  comments:
                    type: array
                    items:
                      $ref: "#/components/schemas/Comment"
                required: [comments]
        "404":
          description: Not Found

components:
  parameters:
    WorkspaceId:
      name: workspaceId
      in: path
      required: true
      schema:
        type: string
    TicketId:
      name: ticketId
      in: path
      required: true
      schema:
        type: string
    PromptId:
      name: promptId
      in: path
      required: true
      schema:
        type: string

  schemas:
    Workspace:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
      required: [id, name]

    StatusDef:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        color:
          type: string
        order:
          type: integer
        isClosed:
          type: boolean
      required: [id, name, color, order, isClosed]

    TicketConfig:
      type: object
      properties:
        defaultStatusId:
          type: string
        closedStatusIds:
          type: array
          items:
            type: string
      required: [defaultStatusId, closedStatusIds]

    FieldType:
      type: string
      enum: [text, number, select, multi-select, user, multi-user, date, url]

    FieldOption:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        color:
          type: string
        metadata:
          type: object
          additionalProperties: true
      required: [id, name]

    FieldDefinition:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        type:
          $ref: "#/components/schemas/FieldType"
        required:
          type: boolean
        description:
          type: string
        options:
          type: array
          items:
            $ref: "#/components/schemas/FieldOption"
      required: [id, name, type, required]

    EntityLabels:
      type: object
      properties:
        ticket:
          type: string
        title:
          type: string
        description:
          type: string
      required: [ticket, title, description]

    WorkspaceConfig:
      type: object
      properties:
        statuses:
          type: array
          items:
            $ref: "#/components/schemas/StatusDef"
        ticketConfig:
          $ref: "#/components/schemas/TicketConfig"
        fields:
          type: array
          items:
            $ref: "#/components/schemas/FieldDefinition"
        labels:
          $ref: "#/components/schemas/EntityLabels"
      required: [statuses, ticketConfig, fields, labels]

    FieldValue:
      type: object
      properties:
        fieldId:
          type: string
          x-go-type: types.FieldID
          x-go-type-import:
            path: github.com/m-mizutani/shepherd/pkg/domain/types
        value: {}
      required: [fieldId, value]

    Ticket:
      type: object
      properties:
        id:
          type: string
        seqNum:
          type: integer
          format: int64
        title:
          type: string
        description:
          type: string
        statusId:
          type: string
        assigneeId:
          type: string
        reporterSlackUserId:
          type: string
        slackChannelId:
          type: string
        slackThreadTs:
          type: string
        fields:
          type: array
          items:
            $ref: "#/components/schemas/FieldValue"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, seqNum, title, statusId, fields, createdAt, updatedAt]

    CreateTicketRequest:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        statusId:
          type: string
        assigneeId:
          type: string
        fields:
          type: array
          items:
            $ref: "#/components/schemas/FieldValue"
      required: [title]

    UpdateTicketRequest:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        statusId:
          type: string
        assigneeId:
          type: string
        fields:
          type: array
          items:
            $ref: "#/components/schemas/FieldValue"

    SlackUserInfo:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
        imageUrl:
          type: string
      required: [id, name]

    Comment:
      type: object
      properties:
        id:
          type: string
        slackUserId:
          type: string
        body:
          type: string
        createdAt:
          type: string
          format: date-time
      required: [id, slackUserId, body, createdAt]

    NotionSource:
      type: object
      properties:
        objectType:
          type: string
          enum: [page, database]
        objectId:
          type: string
        url:
          type: string
        title:
          type: string
      required: [objectType, objectId, url]

    Source:
      type: object
      properties:
        id:
          type: string
        workspaceId:
          type: string
        provider:
          type: string
          enum: [notion]
        description:
          type: string
        notion:
          $ref: "#/components/schemas/NotionSource"
        createdAt:
          type: string
          format: date-time
        createdBy:
          type: string
      required: [id, workspaceId, provider, createdAt]

    CreateSourceRequest:
      type: object
      properties:
        provider:
          type: string
          enum: [notion]
        url:
          type: string
        description:
          type: string
      required: [provider, url]

    UpdateSourceRequest:
      type: object
      properties:
        description:
          type: string
      required: [description]

    ToolState:
      type: object
      properties:
        providerId:
          type: string
        available:
          type: boolean
        defaultEnabled:
          type: boolean
        enabled:
          type: boolean
        reason:
          type: string
          enum: [provider_unavailable, workspace_disabled, gate_blocked]
      required: [providerId, available, defaultEnabled, enabled]

    PromptSlot:
      type: object
      properties:
        id:
          type: string
          description: Stable identifier (e.g. "triage").
        label:
          type: string
        description:
          type: string
        customizable:
          type: boolean
          description: false for slots that are placeholders only.
        configured:
          type: boolean
          description: true when at least one override version exists.
        version:
          type: integer
          description: Current version (0 when no override exists yet).
        length:
          type: integer
        updatedAt:
          type: string
          format: date-time
          nullable: true
        updatedBy:
          $ref: "#/components/schemas/PromptAuthor"
          nullable: true
      required: [id, label, description, customizable, configured, version, length]

    PromptDetail:
      type: object
      properties:
        id:
          type: string
        content:
          type: string
          description: |
            The workspace-specific additional guidance text the user has saved.
            Empty when no override exists yet (the slot is using the bare base
            prompt managed by shepherd).
        version:
          type: integer
          description: 0 when no override exists yet, else the latest stored version.
        isOverride:
          type: boolean
        updatedAt:
          type: string
          format: date-time
          nullable: true
        updatedBy:
          $ref: "#/components/schemas/PromptAuthor"
          nullable: true
      required: [id, content, version, isOverride]

    PromptVersion:
      type: object
      properties:
        version:
          type: integer
        content:
          type: string
        updatedAt:
          type: string
          format: date-time
        current:
          type: boolean
        updatedBy:
          $ref: "#/components/schemas/PromptAuthor"
          nullable: true
      required: [version, content, updatedAt, current]

    PromptAuthor:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
      required: [name]

    PromptVersionConflict:
      type: object
      properties:
        error:
          type: string
          enum: [version_conflict]
        currentVersion:
          type: integer
      required: [error, currentVersion]
